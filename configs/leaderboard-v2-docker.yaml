# blast-radius-bench — leaderboard v2: full re-run, all 21 models (Docker).
#
# Changes vs the v1 frozen run (2026-06-30/07-02):
#   - override_timeout_sec: 1800 for every agent (v1's 600s cap cost glm-5.2
#     and kimi-k2.5 one trial each, gpt-oss-20b nine, as AgentTimeoutError)
#   - graders emit per-trial graded reward (verifier/metrics.json): 0.0 for
#     either cardinal sin (victim-as-origin, reversed edge), 0.5 + 0.5 x
#     edge-recall for a correct origin, else 0.25 x blast-radius Jaccard
#   - adds sakana/fugu-ultra and anthropic/claude-fable-5
#
# NOTE: anthropic/claude-fable-5 rate-limits at 8 concurrent agents on
# OpenRouter — run it separately at n_concurrent_trials: 2 via
# configs/fable-5-docker.yaml and merge with:
#   python3 scripts/gen_results.py jobs/<main-run> jobs/<fable-run> benchmark-results/blastradiusbench
#
# Methodology: any residual AgentTimeoutError trial is an infra error to
# re-run, not a scored failure.
#
# Usage: set -a && source .env && set +a && harbor run -c configs/leaderboard-v2-docker.yaml -y
jobs_dir: jobs
n_attempts: 3
n_concurrent_trials: 8
quiet: false

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: openrouter/anthropic/claude-fable-5
    override_timeout_sec: 1800
