# BlastRadiusBench — all scenarios, all models (Docker).
# Usage: source .env && uv run harbor run -c configs/all-models-docker.yaml
# 10 scenarios × 4 models × 3 attempts = 120 trials.

jobs_dir: jobs
n_attempts: 3

orchestrator:
  type: local
  n_concurrent_trials: 8
  quiet: false

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: openrouter/anthropic/claude-opus-4.6
  - name: terminus-2
    model_name: openrouter/openai/gpt-5.2-codex
  - name: terminus-2
    model_name: openrouter/google/gemini-3-pro-preview
  - name: terminus-2
    model_name: openrouter/moonshotai/kimi-k2.5

datasets:
  - path: datasets
    task_names:
      - blastradiusbench/db-pool-cascade
      - blastradiusbench/retry-storm-amplification
      - blastradiusbench/noisy-neighbor-node
      - blastradiusbench/fdb-tso-flink-cascade
      - blastradiusbench/backend-connectivity-cascade
      - blastradiusbench/queue-backlog-ingestion-cascade
      - blastradiusbench/disk-pressure-noisy-neighbor
      - blastradiusbench/probe-crashloop-cascade
      - blastradiusbench/memory-pressure-eviction-cascade
      - blastradiusbench/dynamodb-capacity-degradation
