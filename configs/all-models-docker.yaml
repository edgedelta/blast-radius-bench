# blast-radius-bench — all scenarios, several frontier models (Docker).
# Usage: set -a && source .env && set +a && harbor run -c configs/all-models-docker.yaml -y
jobs_dir: jobs
n_attempts: 3
n_concurrent_trials: 8
quiet: false

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: openrouter/anthropic/claude-opus-4.6
  - name: terminus-2
    model_name: openrouter/openai/gpt-5.2-codex
  - name: terminus-2
    model_name: openrouter/google/gemini-2.5-pro
  - name: terminus-2
    model_name: openrouter/moonshotai/kimi-k2.5

datasets:
  - path: datasets/blastradiusbench
    task_names:
      - backend-connectivity-cascade
      - db-pool-cascade
      - disk-pressure-noisy-neighbor
      - dynamodb-capacity-degradation
      - fdb-tso-flink-cascade
      - memory-pressure-eviction-cascade
      - noisy-neighbor-node
      - probe-crashloop-cascade
      - queue-backlog-ingestion-cascade
      - retry-storm-amplification
