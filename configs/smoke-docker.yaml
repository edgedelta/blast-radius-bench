# BlastRadiusBench — smoke test: single model, single scenario.
# Usage: source .env && uv run harbor run -c configs/smoke-docker.yaml
# Fast local validation that the task builds, the agent runs, and the grader scores.

jobs_dir: jobs
n_attempts: 1

orchestrator:
  type: local
  n_concurrent_trials: 1
  quiet: false

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: openrouter/anthropic/claude-opus-4.6

datasets:
  - path: datasets
    task_names:
      - blastradiusbench/db-pool-cascade
